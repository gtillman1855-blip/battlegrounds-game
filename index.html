<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma Battlegrounds</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0f; 
            color: white;
            overflow: hidden;
        }
        
        /* MENU */
        #menu { 
            position: fixed; 
            inset: 0; 
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            z-index: 100;
        }
        
        h1 { 
            font-size: 3rem; 
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 20px #00ffff;
        }
        
        .chars { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin: 20px;
        }
        
        .char-btn { 
            width: 150px; 
            height: 150px; 
            border: 3px solid #333;
            border-radius: 15px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: rgba(0,0,0,0.5);
        }
        
        .char-btn:hover { transform: scale(1.1); border-color: #00ff88; }
        .char-btn.selected { border-color: #00ff88; box-shadow: 0 0 30px #00ff88; }
        
        .char-icon { font-size: 3rem; margin-bottom: 10px; }
        
        #kj { background: linear-gradient(180deg, #ff6b35, #f7931e); }
        #sorcerer { background: linear-gradient(180deg, #7b2cbf, #9d4edd); }
        #tsb { background: linear-gradient(180deg, #00f5d4, #00bbf9); }
        #garou { 
            background: linear-gradient(180deg, #1a0033, #000000, #2d1b4e); 
            border-color: #9400d3;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        #startBtn { 
            margin-top: 30px; 
            padding: 15px 40px; 
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00ffff, #0088ff);
            border: none;
            border-radius: 30px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
        }
        
        #startBtn.active { opacity: 1; }
        
        /* GAME */
        #game { display: none; position: fixed; inset: 0; }
        
        #arena { 
            position: absolute; 
            inset: 0; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
        }
        
        .fighter { 
            position: absolute; 
            width: 60px; 
            height: 90px; 
            border-radius: 10px;
            transition: transform 0.1s;
        }
        
        .p1 { background: linear-gradient(180deg, #00f5d4, #00bbf9); left: 100px; }
        .p2 { background: linear-gradient(180deg, #ff6b35, #f7931e); right: 100px; }
        
        .garou-style { 
            background: linear-gradient(180deg, #9400d3, #000000) !important;
            box-shadow: 0 0 30px #ff00ff;
        }
        
        /* UI */
        #ui { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            right: 20px;
            display: flex;
            justify-content: space-between;
        }
        
        .health-bar { 
            width: 300px; 
            height: 30px; 
            background: #333; 
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid white;
        }
        
        .health-fill { 
            height: 100%; 
            transition: width 0.2s;
        }
        
        .p1-health { background: linear-gradient(90deg, #00f5d4, #00bbf9); width: 100%; }
        .p2-health { background: linear-gradient(90deg, #ff6b35, #ff7931e); width: 100%; }
        
        #timer { 
            font-size: 2rem; 
            font-weight: bold;
            text-shadow: 0 0 10px white;
        }
        
        /* CONTROLS HELP */
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .key { color: #00ffff; font-weight: bold; }
        
        /* HIT EFFECT */
        .hit-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, white, yellow, transparent);
            animation: hitExpand 0.3s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes hitExpand {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        /* DASH TRAIL */
        .dash-trail {
            position: absolute;
            width: 60px;
            height: 90px;
            border-radius: 10px;
            opacity: 0.5;
            animation: fadeOut 0.3s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: scale(0.8); }
        }
        
        /* PORTAL */
        .portal {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff00ff, #00ffff, #ff00ff);
            animation: spin 1s linear infinite;
            pointer-events: none;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- MENU -->
<div id="menu">
    <h1>⚔️ CHROMA BATTLEGROUNDS ⚔️</h1>
    <p style="margin-bottom: 20px; color: #ff00ff;">🌌 Cosmic Garou Edition 🌌</p>
    
    <div class="chars">
        <div class="char-btn" id="kj" onclick="selectChar('kj')">
            <div class="char-icon">👊</div>
            <div>Iron Fist KJ</div>
        </div>
        <div class="char-btn" id="sorcerer" onclick="selectChar('sorcerer')">
            <div class="char-icon">🔮</div>
            <div>Void Sorcerer</div>
        </div>
        <div class="char-btn" id="tsb" onclick="selectChar('tsb')">
            <div class="char-icon">⚡</div>
            <div>Blitz TSB</div>
        </div>
        <div class="char-btn" id="garou" onclick="selectChar('garou')">
            <div class="char-icon">🌌</div>
            <div style="color: #ff00ff; font-weight: bold;">COSMIC GAROU</div>
        </div>
    </div>
    
    <button id="startBtn" onclick="startGame()">ENTER ARENA</button>
    <p style="margin-top: 20px; font-size: 0.8rem; color: #888;">
        Click character → Click ENTER ARENA
    </p>
</div>

<!-- GAME -->
<div id="game">
    <div id="arena">
        <div id="p1" class="fighter p1"></div>
        <div id="p2" class="fighter p2"></div>
    </div>
    
    <div id="ui">
        <div>
            <div style="margin-bottom: 5px; color: #00ffff;">PLAYER 1</div>
            <div class="health-bar"><div class="health-fill p1-health" id="p1Health"></div></div>
        </div>
        <div id="timer">99</div>
        <div style="text-align: right;">
            <div style="margin-bottom: 5px; color: #ff6b35;">PLAYER 2</div>
            <div class="health-bar"><div class="health-fill p2-health" id="p2Health"></div></div>
        </div>
    </div>
    
    <div id="controls-help">
        <span class="key">A/D</span> Move | <span class="key">W</span> Jump | <span class="key">J</span> Light | <span class="key">K</span> Heavy | <span class="key">L</span> Special | <span class="key">SHIFT</span> Dash
    </div>
</div>

<script>
// Game State
let selectedChar = null;
let gameRunning = false;
let p1, p2;
let keys = {};

// Character Data
const chars = {
    kj: { name: 'Iron Fist KJ', speed: 5, jump: 15, health: 1200, color: '#00f5d4' },
    sorcerer: { name: 'Void Sorcerer', speed: 4, jump: 12, health: 1000, color: '#9d4edd' },
    tsb: { name: 'Blitz TSB', speed: 8, jump: 18, health: 900, color: '#00f5d4' },
    garou: { name: 'Cosmic Garou', speed: 6, jump: 16, health: 1100, color: '#ff00ff', isGarou: true }
};

// Select Character
function selectChar(char) {
    selectedChar = char;
    document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById(char).classList.add('selected');
    document.getElementById('startBtn').classList.add('active');
}

// Start Game
function startGame() {
    if (!selectedChar) return;
    
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    
    // Setup players
    p1 = new Fighter(selectedChar, 100, window.innerHeight - 150, true);
    p2 = new Fighter('kj', window.innerWidth - 160, window.innerHeight - 150, false);
    
    if (selectedChar === 'garou') {
        document.getElementById('p1').classList.add('garou-style');
    }
    
    gameRunning = true;
    gameLoop();
    startTimer();
}

// Fighter Class
class Fighter {
    constructor(type, x, y, isPlayer) {
        this.type = type;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 60;
        this.height = 90;
        this.isPlayer = isPlayer;
        this.isGrounded = true;
        this.health = chars[type].health;
        this.maxHealth = chars[type].health;
        this.facing = isPlayer ? 1 : -1;
        this.isDashing = false;
        this.dashCooldown = 0;
        this.invincible = 0;
        this.hitstun = 0;
        
        this.element = isPlayer ? document.getElementById('p1') : document.getElementById('p2');
        this.updatePosition();
    }
    
    update() {
        const data = chars[this.type];
        
        // Input
        if (this.isPlayer && this.hitstun === 0) {
            if (keys['a'] || keys['arrowleft']) this.vx = -data.speed;
            else if (keys['d'] || keys['arrowright']) this.vx = data.speed;
            else this.vx *= 0.8;
            
            if ((keys['w'] || keys['arrowup']) && this.isGrounded) {
                this.vy = -data.jump;
                this.isGrounded = false;
            }
            
            // Dash
            if (keys['shift'] && this.dashCooldown === 0 && !this.isDashing) {
                this.dash();
            }
        } else if (!this.isPlayer) {
            // Simple AI
            const target = p1;
            const dist = target.x - this.x;
            if (Math.abs(dist) > 100) {
                this.vx = Math.sign(dist) * data.speed * 0.7;
            } else if (Math.random() < 0.02) {
                this.attack();
            }
        }
        
        // Dash physics
        if (this.isDashing) {
            this.vx = this.facing * 25;
        }
        
        // Apply physics
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.8; // gravity
        
        // Ground
        if (this.y >= window.innerHeight - 150) {
            this.y = window.innerHeight - 150;
            this.vy = 0;
            this.isGrounded = true;
        }
        
        // Bounds
        this.x = Math.max(50, Math.min(window.innerWidth - 110, this.x));
        
        // Facing
        if (!this.isDashing && this.hitstun === 0) {
            const target = this.isPlayer ? p2 : p1;
            this.facing = target.x > this.x ? 1 : -1;
        }
        
        // Timers
        if (this.dashCooldown > 0) this.dashCooldown--;
        if (this.invincible > 0) this.invincible--;
        if (this.hitstun > 0) {
            this.hitstun--;
            this.vx *= 0.9;
        }
        
        this.updatePosition();
        this.updateHealth();
    }
    
    dash() {
        this.isDashing = true;
        this.dashCooldown = 40;
        this.invincible = 10;
        
        // Trail effect
        const trail = document.createElement('div');
        trail.className = 'dash-trail';
        trail.style.left = this.x + 'px';
        trail.style.top = this.y + 'px';
        trail.style.background = getComputedStyle(this.element).background;
        document.getElementById('arena').appendChild(trail);
        setTimeout(() => trail.remove(), 300);
        
        // Portal for Garou
        if (chars[this.type].isGarou) {
            const portal = document.createElement('div');
            portal.className = 'portal';
            portal.style.left = (this.x - 10) + 'px';
            portal.style.top = (this.y - 10) + 'px';
            document.getElementById('arena').appendChild(portal);
            setTimeout(() => portal.remove(), 500);
        }
        
        setTimeout(() => {
            this.isDashing = false;
            this.vx = this.facing * chars[this.type].speed;
        }, 200);
    }
    
    attack() {
        // Simple attack
        const target = this.isPlayer ? p2 : p1;
        const dist = Math.abs(target.x - this.x);
        
        if (dist < 100 && target.invincible === 0) {
            target.takeDamage(50, this.facing * 20, -10);
            
            // Hit effect
            const hit = document.createElement('div');
            hit.className = 'hit-effect';
            hit.style.left = (target.x + 10) + 'px';
            hit.style.top = (target.y + 10) + 'px';
            document.getElementById('arena').appendChild(hit);
            setTimeout(() => hit.remove(), 300);
        }
    }
    
    takeDamage(dmg, kbX, kbY) {
        this.health -= dmg;
        this.vx = kbX;
        this.vy = kbY;
        this.hitstun = 15;
        this.isGrounded = false;
        
        if (this.health <= 0) {
            this.health = 0;
            endGame(this.isPlayer ? 'P2 WINS!' : 'P1 WINS!');
        }
    }
    
    updatePosition() {
        this.element.style.left = this.x + 'px';
        this.element.style.top = this.y + 'px';
        this.element.style.transform = `scaleX(${this.facing})`;
    }
    
    updateHealth() {
        const pct = (this.health / this.maxHealth) * 100;
        const bar = this.isPlayer ? document.getElementById('p1Health') : document.getElementById('p2Health');
        bar.style.width = pct + '%';
    }
}

// Input
window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    if (gameRunning && p1 && e.key.toLowerCase() === 'j') {
        p1.attack();
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

// Game Loop
function gameLoop() {
    if (!gameRunning) return;
    p1.update();
    p2.update();
    requestAnimationFrame(gameLoop);
}

// Timer
function startTimer() {
    let time = 99;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
        if (!gameRunning) {
            clearInterval(interval);
            return;
        }
        time--;
        timerEl.textContent = time;
        if (time <= 0) {
            clearInterval(interval);
            endGame(p1.health > p2.health ? 'P1 WINS!' : 'P2 WINS!');
        }
    }, 1000);
}

// End Game
function endGame(winner) {
    gameRunning = false;
    alert(winner + '\n\nRefresh to play again!');
    location.reload();
}
</script>

</body>
</html>
